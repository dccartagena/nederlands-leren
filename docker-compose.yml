services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nl-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://nluser:nlpass@db:5432/nldb
      AUDIO_DIR: /app/data/audio
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nl-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: nl-db
    environment:
      POSTGRES_USER: nluser
      POSTGRES_PASSWORD: nlpass
      POSTGRES_DB: nldb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nluser -d nldb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: nl-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  pgdata:
  ollama_data:
